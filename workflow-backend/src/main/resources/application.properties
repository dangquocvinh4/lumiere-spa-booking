spring.application.name=workflow-backend

# Database Configuration (MySQL Local)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/spa_booking?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT Configuration
app.jwt.secret=${JWT_SECRET:SPA_BOOKING_SUPER_SECRET_KEY_123456789}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Security/CORS
